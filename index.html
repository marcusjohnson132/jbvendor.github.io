<!DOCTYPE html>
<html>
<head>
<title>Luxury Vendor</title>

<style>
body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

header{
background:black;
padding:20px;
font-size:30px;
font-weight:bold;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:40px;
}

.product{
background:#1a1a1a;
padding:20px;
border-radius:10px;
}

.product img{
width:100%;
border-radius:8px;
}

button{
background:#00ff9d;
border:none;
padding:10px 20px;
margin-top:10px;
font-weight:bold;
cursor:pointer;
border-radius:5px;
}

footer{
background:black;
padding:15px;
}
</style>
</head>

<body>

<header>JB Vendor</header>

<div class="products">

<div class="product">
<img src="https://i.imgur.com/Jh6s7Rk.jpg">
<h3>Sp5der Hoodie</h3>
<p>$60</p>
<button>Buy Now</button>
</div>

<div class="product">
<img src="https://i.imgur.com/Z8qvK9O.jpg">
<h3>Essentials Hoodie</h3>
<p>$65</p>
<button>Buy Now</button>
</div>

<div class="product">
<img src="https://i.imgur.com/6u7yFQK.jpg">
<h3>Chrome Hearts Hat</h3>
<p>$40</p>
<button>Buy Now</button>
</div>

<div class="product">
<img src="https://i.imgur.com/T8kYw8E.jpg">
<h3>Amiri Shirt</h3>
<p>$60</p>
<button>Buy Now</button>
</div>

</div>

<footer>
DM to order
</footer>

</body>
</html>
